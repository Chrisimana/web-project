<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Notes Web</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a href="../../index.html" class="back-button">← Kembali</a>

<div class="container">
    <div class="notes-app">
        <div class="header">
            <h1>Notes Web</h1>
            <p>Simpan catatanmu di sini</p>
        </div>

        <div class="input-section">
            <input type="text" id="noteTitle" placeholder="Judul catatan..." maxlength="100">
            <textarea id="noteContent" rows="4" placeholder="Tulis catatanmu di sini..."></textarea>
            <div class="input-actions">
                <button id="addNoteBtn" class="primary-btn">➕ Tambah Catatan</button>
                <button id="deleteAllBtn" class="danger-btn">🗑️ Hapus Semua</button>
            </div>
        </div>

        <div class="search-section">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="Cari catatan...">
            </div>
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">Semua</button>
                <button class="filter-btn" data-filter="recent">Terbaru</button>
                <button class="filter-btn" data-filter="oldest">Terlama</button>
            </div>
        </div>

        <div class="stats">
            <span id="noteCount">0 catatan</span>
            <span id="storageStatus">💾 Tersimpan di lokal</span>
        </div>

        <div id="notesList" class="notes-list">
            <div class="empty-state">
                <span>📭</span>
                <p>Belum ada catatan</p>
                <small>Tambahkan catatan pertamamu!</small>
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
