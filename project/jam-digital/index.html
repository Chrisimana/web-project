<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Jam Digital</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a href="../../index.html" class="back-button">← Kembali</a>

<div class="clock-container">
    <div class="title">
        ⏱️ JAM DIGITAL ⏲️
    </div>

    <div class="digital-display">
        <div class="time" id="clockTime">--:--:--</div>
        <div class="date-info" id="dateInfo"></div>
    </div>

    <div class="clock-controls">
        <button class="mode-btn" id="mode24Btn">🕙 24 JAM</button>
        <button class="mode-btn" id="mode12Btn">🕛 12 JAM (AM/PM)</button>
    </div>

    <div id="formatBadge" class="format-indicator">🕒 Mode: 24 Jam</div>

    <div class="seconds-extra">
        <span>⚡ Detik Real-time</span>
        <span>🎨 Efek Neon</span>
        <span>📆 Dinamis</span>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
