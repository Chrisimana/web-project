<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <a href="../../index.html" class="back-button">← Kembali</a>
    <div class="container">
        <div class="todo-app">
            <h1>📝 My To Do List</h1>
            
            <div class="input-container">
                <input 
                    type="text" 
                    id="todoInput" 
                    placeholder="Tambahkan tugas baru..."
                    class="todo-input"
                >
                <button id="addBtn" class="add-btn">Tambah</button>
            </div>

            <div class="stats">
                <span>Total: <strong id="totalTodos">0</strong></span>
                <span>Selesai: <strong id="completedTodos">0</strong></span>
            </div>

            <ul id="todoList" class="todo-list">
                <!-- Items akan ditambahkan di sini -->
            </ul>

            <div id="emptyMessage" class="empty-message">
                Belum ada tugas. Tambahkan satu untuk memulai! 🚀
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
