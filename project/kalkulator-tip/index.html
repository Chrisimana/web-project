<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Kalkulator TIP</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a href="../../index.html" class="back-button">← Kembali</a>

<div class="container">
    <div class="calculator-card">
        <div class="header">
            <h1>Kalkulator TIP</h1>
            <p>Hitung tip dengan mudah & cepat</p>
        </div>

        <div class="input-group">
            <label for="billAmount">💰 Total Tagihan</label>
            <div class="input-wrapper">
                <span class="currency">Rp</span>
                <input type="number" id="billAmount" placeholder="0" value="250000" step="1000">
            </div>
        </div>

        <div class="input-group">
            <label for="tipPercentage">🎯 Persentase Tip</label>
            <div class="tip-buttons">
                <button type="button" class="tip-btn" data-tip="5">5%</button>
                <button type="button" class="tip-btn" data-tip="10">10%</button>
                <button type="button" class="tip-btn active" data-tip="15">15%</button>
                <button type="button" class="tip-btn" data-tip="20">20%</button>
                <button type="button" class="tip-btn" data-tip="25">25%</button>
            </div>
            <div class="custom-tip">
                <span>Atau custom:</span>
                <input type="number" id="customTip" placeholder="Misal: 18" step="0.5" min="0">
                <span>%</span>
            </div>
        </div>

        <div class="input-group">
            <label for="peopleCount">👥 Jumlah Orang</label>
            <div class="people-control">
                <button type="button" id="decrementPeople" class="people-btn">-</button>
                <input type="number" id="peopleCount" value="2" min="1" step="1">
                <button type="button" id="incrementPeople" class="people-btn">+</button>
            </div>
        </div>

        <div class="result-section">
            <div class="result-card">
                <div class="result-item">
                    <div class="result-label">
                        <span>💸 Total Tip</span>
                        <small>Tip untuk seluruh tagihan</small>
                    </div>
                    <div class="result-value" id="totalTip">Rp 0</div>
                </div>
                <div class="result-item">
                    <div class="result-label">
                        <span>🧾 Total + Tip</span>
                        <small>Keseluruhan yang harus dibayar</small>
                    </div>
                    <div class="result-value total-bill" id="totalWithTip">Rp 0</div>
                </div>
                <div class="divider"></div>
                <div class="result-item highlight">
                    <div class="result-label">
                        <span>👤 Per Orang</span>
                        <small>Masing-masing orang bayar</small>
                    </div>
                    <div class="result-value per-person" id="perPerson">Rp 0</div>
                </div>
            </div>
        </div>

        <div class="info-note">
            <span>✨ Tip dihitung dari total tagihan sebelum tip</span>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
